<script>

let uploadedFile=null
let analysisData=null

const dropArea=document.getElementById("dropArea")

dropArea.addEventListener("dragover",e=>{
e.preventDefault()
})

dropArea.addEventListener("drop",e=>{

e.preventDefault()

uploadedFile=e.dataTransfer.files[0]

previewImage(uploadedFile)

})

document.getElementById("fileInput").addEventListener("change",function(){

uploadedFile=this.files[0]

previewImage(uploadedFile)

})


function previewImage(file){

let reader=new FileReader()

reader.onload=function(e){

let preview=document.getElementById("preview")

preview.src=e.target.result
preview.style.display="block"

}

reader.readAsDataURL(file)

}


async function analyzePrescription(){

if(!uploadedFile){

alert("Upload prescription first")
return

}

let formData=new FormData()

formData.append("file",uploadedFile)

try{

const response=await fetch("/upload",{
method:"POST",
body:formData
})

const data=await response.json()

analysisData=data

displayResults(data)

}catch(e){

alert("Analysis failed")

}

}


function displayResults(data){

// dashboard

document.getElementById("totalMedicines").innerText=
data.dashboard?.total_medicines || 0

document.getElementById("antibioticCount").innerText=
data.dashboard?.antibiotic_count || 0

document.getElementById("injectionCount").innerText=
data.dashboard?.injection_count || 0

document.getElementById("polypharmacy").innerText=
data.dashboard?.polypharmacy ? "YES ⚠":"No"


// medicine table

let tableBody=document.querySelector("#medicineTable tbody")

tableBody.innerHTML=""

if(!data.medicines_detected || data.medicines_detected.length===0){

tableBody.innerHTML="<tr><td colspan='2'>No medicines detected</td></tr>"

}else{

data.medicines_detected.forEach(m=>{

let cls="Unknown"

if(data.drug_classification){
cls=data.drug_classification[m] || "Unknown"
}

tableBody.innerHTML+=`
<tr>
<td>${m}</td>
<td>${cls}</td>
</tr>
`

})

}


// interactions

let alerts=document.getElementById("alerts")

alerts.innerHTML=""

if(data.drug_interactions && data.drug_interactions.length>0){

data.drug_interactions.forEach(i=>{

alerts.innerHTML+=`
<div class="alert">
<b>${i.severity}</b><br>
${i.drug1} + ${i.drug2}<br>
${i.message}
</div>
`

})

}else{

alerts.innerHTML="<p>No interactions detected</p>"

}


// chart

createChart(data)

}


function createChart(data){

new Chart(document.getElementById("medicineChart"),{

type:"bar",

data:{
labels:data.medicines_detected || [],
datasets:[{
label:"Detected Medicines",
data:(data.medicines_detected || []).map(()=>1)
}]
}

})

}


async function downloadReport(){

if(!analysisData){

alert("Analyze prescription first")
return

}

const response=await fetch("/report",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({

medicines:analysisData.medicines_detected,
interactions:analysisData.drug_interactions

})

})

const blob=await response.blob()

const url=window.URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="clinical_report.pdf"

a.click()

}

</script>
