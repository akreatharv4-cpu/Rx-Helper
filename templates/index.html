<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rx-Helper Clinical Dashboard</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

:root{
--primary:#2c3e50;
--secondary:#3498db;
--danger:#e74c3c;
--warning:#f39c12;
--minor:#f1c40f;
--success:#27ae60;
--bg:#f4f7f6;
}

body{
font-family:"Segoe UI";
background:var(--bg);
margin:0;
}

.dashboard{
display:grid;
grid-template-columns:280px 1fr;
min-height:100vh;
}

/* sidebar */

.sidebar{
background:white;
padding:25px;
box-shadow:2px 0 8px rgba(0,0,0,0.05);
}

.sidebar h2{
margin-top:0;
}

.sidebar input,select{
width:100%;
padding:8px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:6px;
}

/* main area */

.main{
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
}

.upload-card{
background:white;
padding:30px;
border-radius:10px;
border:2px dashed var(--secondary);
text-align:center;
margin-top:20px;
}

.upload-card:hover{
background:#eef6ff;
}

button{
background:var(--secondary);
color:white;
border:none;
padding:10px 20px;
border-radius:8px;
cursor:pointer;
}

/* cards */

.card{
background:white;
padding:20px;
border-radius:10px;
margin-top:20px;
box-shadow:0 4px 6px rgba(0,0,0,0.08);
}

/* medicine cards */

.drug-card{
display:inline-block;
background:#eef7ff;
padding:10px 15px;
border-radius:10px;
margin:6px;
}

.drug-card span{
font-size:12px;
color:#555;
}

/* interactions */

.interaction{
padding:10px;
margin:10px 0;
border-left:6px solid;
background:#fafafa;
}

.high{border-color:var(--danger)}
.moderate{border-color:var(--warning)}
.minor{border-color:var(--minor)}

.warning{
background:#fff3cd;
padding:10px;
margin-top:10px;
border-left:5px solid var(--warning);
}

.loading{
display:none;
text-align:center;
margin-top:20px;
}

</style>
</head>

<body>

<div class="dashboard">

<!-- Sidebar -->

<div class="sidebar">

<h2>Patient Profile</h2>

<label>Age</label>
<input id="age" type="number">

<label>Pregnancy</label>
<select id="pregnancy">
<option>No</option>
<option>Yes</option>
</select>

<label>Kidney Function</label>
<select id="renal">
<option>Normal</option>
<option>Impaired</option>
</select>

</div>

<!-- Main -->

<div class="main">

<div class="header">
<h1><i class="fas fa-file-medical"></i> Rx-Helper</h1>
</div>

<!-- Upload -->

<div class="upload-card">

<h3>Upload Prescription</h3>

<input type="file" id="fileInput" accept="image/*,.pdf">

<br><br>

<button onclick="analyze()">Analyze Prescription</button>

</div>

<div class="loading" id="loader">
<i class="fas fa-spinner fa-spin"></i>
Scanning Prescription...
</div>

<!-- Medicines -->

<div class="card">

<h3><i class="fas fa-capsules"></i> Medicines</h3>

<div id="medList"></div>

</div>

<!-- Dose warnings -->

<div class="card">

<h3><i class="fas fa-exclamation-circle"></i> Dose Warnings</h3>

<div id="doseWarnings"></div>

</div>

<!-- Interactions -->

<div class="card">

<h3><i class="fas fa-exclamation-triangle"></i> Drug Interactions</h3>

<div id="interactionList"></div>

</div>

<!-- Raw OCR -->

<div class="card">

<h3>Extracted Text</h3>

<pre id="rawText"></pre>

</div>

</div>

</div>

<script>

async function analyze(){

const file=document.getElementById("fileInput").files[0]

if(!file){
alert("Upload prescription first")
return
}

document.getElementById("loader").style.display="block"

const formData=new FormData()

formData.append("file",file)

const res=await fetch("/upload",{
method:"POST",
body:formData
})

const data=await res.json()

document.getElementById("loader").style.display="none"

displayResults(data)

}

function displayResults(data){

/* medicines */

const meds=data.medicines_detected || []

const classes=data.drug_classes || {}

let html=""

meds.forEach(m=>{
html+=`
<div class="drug-card">
<b>${m}</b><br>
<span>${classes[m]||"Unknown class"}</span>
</div>
`
})

document.getElementById("medList").innerHTML=html

/* dose warnings */

const warnings=data.dose_warnings || []

let warnHTML=""

warnings.forEach(w=>{
warnHTML+=`
<div class="warning">
${w.drug} dose ${w.dose}mg exceeds limit ${w.limit}mg
</div>
`
})

document.getElementById("doseWarnings").innerHTML=warnHTML || "No warnings"

/* interactions */

const interactions=data.drug_interactions || []

let intHTML=""

interactions.forEach(i=>{

let cls="minor"

if(i.severity==="High") cls="high"
if(i.severity==="Moderate") cls="moderate"

intHTML+=`
<div class="interaction ${cls}">
<b>${i.drug1} + ${i.drug2}</b><br>
Severity: ${i.severity}<br>
${i.message}
</div>
`

})

document.getElementById("interactionList").innerHTML=intHTML || "No interactions"

/* raw */

document.getElementById("rawText").innerText=data.raw_text

}

</script>

</body>
</html>
